<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Categories</title>

	<link rel="stylesheet" href="css/framework7.bundle.min.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<div id="app">

		<div class="view view-main view-init">


			<section class="page" data-name="categories">


				<nav class="navbar">
					<div class="navbar-bg"></div>
					<div class="navbar-inner">

						<div class="left">
							<a href="#" class="link back">
								<i class="material-icons">arrow_back</i>
							</a>
						</div>

						<div class="title">Categories</div>

						<div class="right">
							<a href="#" class="link panel-open" data-panel="right">
								<i class="material-icons">menu</i>
							</a>
						</div>

					</div>
				</nav>


				<div class="page-content">

					<div class="list media-list categories-list">
						<ul>

							<li>
								<a href="/hamburger/" class="item-link item-content">
									<div class="item-media">
										<img src="img/burger.png" class="cat-img" alt="Hamburger">
									</div>
									<div class="item-inner">
										<div class="item-title">Hamburger</div>
									</div>
									<div class="item-after">
										<span class="product-plus">
											<i class="material-icons">add</i>
										</span>
									</div>
								</a>
							</li>

							<li>
								<a href="/pizzas/" class="item-link item-content">
									<div class="item-media">
										<img src="img/pizza1.png" class="cat-img" alt="Pizzas">
									</div>
									<div class="item-inner">
										<div class="item-title">Pizzas</div>
									</div>
									<div class="item-after">
										<span class="product-plus">
											<i class="material-icons">add</i>
										</span>
									</div>
								</a>
							</li>

							<li>
								<a href="/donuts/" class="item-link item-content">
									<div class="item-media">
										<img src="img/donut.png" class="cat-img" alt="Donuts">
									</div>
									<div class="item-inner">
										<div class="item-title">Donuts</div>
									</div>
									<div class="item-after">
										<span class="product-plus">
											<i class="material-icons">add</i>
										</span>
									</div>
								</a>
							</li>

							<li>
								<a href="/hamburger/" class="item-link item-content product-item">
									<div class="item-media">
										<img src="img/burger.png" class="product-img" alt="Big Mac Bacon">
									</div>
									<div class="item-inner">
										<div class="product-title">Big Mac Bacon</div>
										<div class="product-category">Hamburger</div>
										<div class="product-price">$8.70</div>
									</div>
									<div class="item-after">
										<span class="product-plus">
											<i class="material-icons">add</i>
										</span>
									</div>
								</a>
							</li>

						</ul>
					</div>

				</div>


				<div class="toolbar toolbar-bottom custom-toolbar">
					<div class="toolbar-inner">
						<a href="/categories/" class="link">
							<i class="material-icons">home</i>
						</a>
						<a href="/categories/" class="link active">
							<i class="material-icons">local_offer</i>
						</a>
						<a href="/categories/" class="link">
							<i class="material-icons">shopping_cart</i>
						</a>
						<a href="/categories/" class="link">
							<i class="material-icons">notifications</i>
						</a>
						<a href="/categories/" class="link">
							<i class="material-icons">person</i>
						</a>
					</div>
				</div>

			</section>


		</div>

	</div>
	<script src="js/framework7.bundle.min.js"></script>
	<script src="js/app.js"></script>

</body>

</html>
